name: Nightly Test Suite

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  nightly-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ArchiScrapper.sln

      - name: Build
        run: dotnet build ArchiScrapper.sln --configuration Release --no-restore

      - name: Integration tests
        run: dotnet test tests/CommonMessaging.IntegrationTests/CommonMessaging.IntegrationTests.csproj --configuration Release --no-build

      - name: E2E tests
        run: dotnet test tests/CommonMessaging.E2ETests/CommonMessaging.E2ETests.csproj --configuration Release --no-build

      - name: Consumer simulation tests
        run: dotnet test tests/CommonMessaging.ConsumerSimulationTests/CommonMessaging.ConsumerSimulationTests.csproj --configuration Release --no-build

      - name: Compatibility tests
        run: dotnet test tests/CommonMessaging.CompatibilityTests/CommonMessaging.CompatibilityTests.csproj --configuration Release --no-build
